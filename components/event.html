<!-- Event Details -->
<section id="event" class="event-section section-padding">
    <div class="container text-center reveal">
        <h2 class="section-title">When & Where</h2>
        <div class="event-cards">
            <div class="event-card glass-panel reveal reveal-left">
                <i class="fa-regular fa-calendar-days event-icon"></i>
                <h3>Date</h3>
                <p class="event-detail" id="event-date">January 1, 2027</p>
            </div>
            <div class="event-card glass-panel reveal reveal-bottom">
                <i class="fa-regular fa-clock event-icon"></i>
                <h3>Time</h3>
                <p class="event-detail" id="event-time">5:00 PM</p>
            </div>
            <div class="event-card glass-panel reveal reveal-right">
                <i class="fa-solid fa-map-location-dot event-icon"></i>
                <h3>Location</h3>
                <p class="event-detail" id="event-location">Grand Venue, City</p>
            </div>
        </div>
    </div>
</section>
