<!-- Loading Screen -->
<div id="loading-screen" class="loading-screen">
    <div class="loader">
        <div class="wax-seal">
            <svg viewBox="0 0 100 100" width="120" height="120">
                <!-- Two golden interlocking rings -->
                <circle cx="40" cy="50" r="25" fill="none" stroke="var(--primary-color)" stroke-width="4" opacity="0.8"/>
                <circle cx="60" cy="50" r="25" fill="none" stroke="var(--primary-color)" stroke-width="4" opacity="0.8"/>
            </svg>
        </div>
        <h1 class="loader-text">A Celebration of Love</h1>
        <p class="loader-subtext">You are cordially invited</p>
        
        <button id="open-invitation" class="btn btn-primary"
            style="margin-top: 40px; opacity: 0; pointer-events: none; transition: opacity 1s ease; position: relative; z-index: 5; font-size: 0.95rem; padding: 12px 40px;">Open Envelope</button>
    </div>
</div>
