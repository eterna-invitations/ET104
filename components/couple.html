<!-- Couple Section -->
<section id="couple" class="couple-section section-padding">
    <div class="container text-center reveal">
        <h2 class="section-title">The Couple</h2>
        <p class="quote" id="couple-quote">"Always and Forever."</p>

        <div class="couple-grid py-4">
            <div class="couple-card glass-panel">
                <div class="couple-img-wrapper">
                    <img id="bride-img" src="" alt="Bride">
                </div>
                <h3 id="bride-name-display" class="couple-name">Bride Name</h3>
                <p class="couple-role">The Bride</p>
            </div>
            <div class="couple-card glass-panel">
                <div class="couple-img-wrapper">
                    <img id="groom-img" src="" alt="Groom">
                </div>
                <h3 id="groom-name-display" class="couple-name">Groom Name</h3>
                <p class="couple-role">The Groom</p>
            </div>
        </div>
    </div>
</section>
